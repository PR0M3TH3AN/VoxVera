name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build pyinstaller
      - name: Build wheel
        run: python -m build --wheel --sdist
      - name: Build binary
        run: |
          pyinstaller --onefile \
            --add-data "voxvera/locales:voxvera/locales" \
            --add-data "voxvera/src:voxvera/src" \
            --add-data "voxvera/templates:voxvera/templates" \
            --add-data "voxvera/resources:voxvera/resources" \
            --add-data "requirements.txt:." \
            --name voxvera-linux \
            voxvera/cli.py
      - name: Create AppImage
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          bash packaging/build_appimage.sh
      - name: Build Docker image
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/${OWNER_LC}/voxvera:${{ github.ref_name }} .
      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push Docker image
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker push ghcr.io/${OWNER_LC}/voxvera:${{ github.ref_name }}
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/voxvera-linux
            dist/VoxVera.AppImage
